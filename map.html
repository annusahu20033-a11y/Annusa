<!DOCTYPE html>
<html>
<head>
<title>Map & Visiting Time</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

h1{
text-align:center;
font-size:50px;
font-family:cursive;
color:#002b5c;
font-family: Georgia,sans-serif
}

.map{
text-align:center;
margin:30px 0;
}

.map img{
width:30%;
height:400px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

h2{
text-align:center;
font-size:40px;
font-family:cursive;
color:#002b5c;
font-family: Georgia,sans-serif
}

table{
width:50%;
margin:auto;
border-collapse:collapse;
background:white;
box-shadow:0 0 10px lightgray;

}

th,td{
border:1px solid #ccc;
padding:15px;
text-align:center;
}

th{
background:#0056d6;
color:white;
}
</style>

</head>
<body>

<h1>📍 Tourist Location Map</h1>
<hr width="60%">

<div class="map">
<img src="map.png" alt="Map">
</div>

<h2>🕒 Visiting Time</h2>
<hr width="60%" >

<table>
<tr>
<th>Place</th>
<th>Opening Time</th>
<th>Closing Time</th>
</tr>

<tr>
<td>Taj Mahal</td>
<td>6:00 AM</td>
<td>6:30 PM</td>
</tr>

<tr>
<td>Goa Beach</td>
<td>Open All Day</td>
<td>Open All Day</td>
</tr>

<tr>
<td>Red Fort</td>
<td>9:00 AM</td>
<td>5:00 PM</td>
</tr>

<tr>
<td>Charminar</td>
<td>9:30 AM</td>
<td>5:30 PM</td>
</tr>

</table>

</body>
