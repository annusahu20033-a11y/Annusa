<!DOCTYPE html>
<html>
<head>
<title>Contect Us</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

h1{
text-align:center;
font-size:55px;
font-family:cursive;
color:#002b5c;
margin-top:20px;
font-family: georgia,sans-serif;
}

.contact-box{
width:60%;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

label{
font-size:20px;
font-weight:bold;
}

input,textarea{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
font-size:16px;
}

button{
background:#0056d6;
color:white;
padding:12px 25px;
border:none;
border-radius:5px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#003c99;
}

.info{
text-align:center;
margin-top:30px;
font-size:20px;
}

</style>
</head>

<body>

<h1>📞 Contact Us</h1>
<hr width="60%">

<div class="contact-box">

<form>

<label>Full Name</label>
<input type="text" placeholder="Enter Your Name">

<label>Email</label>
<input type="email" placeholder="Enter Your Email">

<label>Mobile Number</label>
<input type="text" placeholder="Enter Your Number">

<label>Message</label>
<textarea rows="5" placeholder="Write Your Message"></textarea>

<button type="submit">Send Message</button>

</form>

</div>

<div class="info">


<p>✉️ tourist guide website</p>
<p>Created by Annusahu</p>
<hr width="60%">
</div>

</body>
</html>
